version: "3"

tasks:
  default:
    desc: Show available tasks
    cmds:
      - "task --list"
    silent: true

  help:
    desc: Show available tasks
    cmds:
      - "task --list"
    silent: true

  install:
    desc: Install the virtual environment and pre-commit hooks
    cmds:
      - 'echo "Creating virtual environment using uv"'
      - "uv sync"
      - "uv run pre-commit install"

  quality:
    desc: Run the same quality checks as CI.
    cmds:
      - 'echo "Checking lock file consistency with pyproject.toml"'
      - "uv sync --locked"
      - 'echo "Linting code: Running pre-commit"'
      - "uv run pre-commit run -a --show-diff-on-failure"

  check:
    desc: Run local quality and typing checks.
    cmds:
      - 'echo "Checking lock file consistency with pyproject.toml"'
      - "uv lock --locked"
      - 'echo "Linting code: Running pre-commit"'
      - "uv run pre-commit run -a"
      - 'echo "Static type checking: Running {{ cookiecutter.type_checker }}"'
      - "uv run {% if cookiecutter.type_checker == 'mypy' %}mypy{% else %}ty check{% endif %}"

  type-check:
    desc: Run static type checking.
    cmds:
      - 'echo "Static type checking: Running {{ cookiecutter.type_checker }}"'
      - "uv run {% if cookiecutter.type_checker == 'mypy' %}mypy{% else %}ty check{% endif %}"

  test:
    desc: Test the code with pytest
    cmds:
      - 'echo "Testing code: Running pytest"'
{%- if cookiecutter.codecov == "y" %}
      - "uv run python -m pytest --cov --cov-config=pyproject.toml --cov-report=xml"
{%- else %}
      - "uv run python -m pytest --doctest-modules"
{%- endif %}

  clean-build:
    desc: Clean build artifacts
    cmds:
      - 'echo "Removing build artifacts"'
      - >-
        uv run python -c "import os, shutil; shutil.rmtree('dist') if
        os.path.exists('dist') else None"

  build:
    desc: Build wheel file
    deps:
      - clean-build
    cmds:
      - 'echo "Creating wheel file"'
      - "uvx --from build pyproject-build --installer uv"

{%- if cookiecutter.publish_to_pypi == "y" %}
  publish:
    desc: Publish a release to PyPI.
    cmds:
      - 'echo "Publishing."'
      - "uvx twine upload --repository-url https://upload.pypi.org/legacy/ dist/*"

  build-and-publish:
    desc: Build and publish.
    deps:
      - build
    cmds:
      - task: publish
{%- endif %}

  ci:
    desc: Run the full CI-equivalent task suite.
    cmds:
      - task: quality
      - task: test
      - task: type-check
