name: Main

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: {% raw %}pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}{% endraw %}

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env

      - name: Run checks
        run: task quality

  tests-and-type-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
      fail-fast: false
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Set up the environment
        uses: ./.github/actions/setup-python-env
        with:
          python-version: {% raw %}${{ matrix.python-version }}{% endraw %}

      - name: Run tests
        run: task test

      - name: Check typing
        run: task type-check

{% if cookiecutter.codecov == "y" %}
      - name: Upload coverage reports to Codecov with GitHub Action on Python 3.11
        uses: codecov/codecov-action@v4
        if: {% raw %}${{ matrix.python-version == '3.11' }}{% endraw %}
        env:
          {% raw %}CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}{% endraw %}
{%- endif %}

  dbtf-tests:
    if: {% raw %}${{ github.event_name == 'pull_request' }}{% endraw %}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up the environment
        uses: ./.github/actions/setup-dbtf-env

      - name: Build changed graph with DBT Fusion
        env:
          STATE_DIR: .github/dbtf-state
        run: |
          set -euo pipefail

          git fetch --no-tags --prune origin main
          PR_HEAD="$(git rev-parse HEAD)"
          MERGE_BASE="$(git merge-base origin/main "$PR_HEAD")"

          rm -rf "$STATE_DIR"
          mkdir -p "$STATE_DIR"

          git checkout --force "$MERGE_BASE"
          dbtf deps
          dbtf parse --profiles-dir .github -t ci
          cp target/manifest.json "$STATE_DIR/manifest.json"

          git checkout --force "$PR_HEAD"
          dbtf deps
          dbtf build --selector ci_run --state "$STATE_DIR" --profiles-dir .github -t ci --defer

      - name: Upload DBT Fusion artifacts on failure
        if: {% raw %}${{ failure() }}{% endraw %}
        uses: actions/upload-artifact@v4
        with:
          name: dbtf-artifacts
          path: |
            target/run_results.json
            target/manifest.json
